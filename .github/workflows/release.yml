name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  release:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      # Required for npm provenance (OIDC).
      id-token: write
      contents: read
    # Mirror CI's MySQL service so the release's own test run exercises the
    # MySQL adapter tests (and satisfies the CI guard that OVEN_MYSQL_TEST_URL
    # is set whenever CI is truthy) — the publish gate must be at least as
    # strong as CI.
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: oven_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=15
    steps:
      - uses: actions/checkout@v7

      # Provides the npm registry auth scaffolding (.npmrc + NODE_AUTH_TOKEN).
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Check (format, lint, types)
        run: vp check

      - name: Typecheck
        run: vp run typecheck

      - name: Test
        env:
          OVEN_MYSQL_TEST_URL: "mysql://root:root@127.0.0.1:3306/oven_test"
        run: vp test run

      - name: Build
        run: vp pack

      - name: Publish
        run: vp pm publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
